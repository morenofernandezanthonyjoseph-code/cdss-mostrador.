name: Enriquecer catalogo de farmacos

on:
  schedule:
    - cron: "0 6 1 * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  enrich:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar el repo
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Regenerar el catalogo desde RxClass (NLM)
        run: python backend/scripts/enrich.py

      - name: Commitear si hubo cambios
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "auto: catalogo actualizado"
          commit_user_name: "cdss-bot"
          commit_user_email: "bot@users.noreply.github.com"
          file_pattern: backend/app/data/drugs.json
